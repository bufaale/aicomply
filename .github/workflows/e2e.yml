name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  unit:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run unit tests with coverage
        run: npm run test:cov
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 14

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (against production, excludes live AI generators by default)
        env:
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Stripe price ID guard test (stripe-price-ids-valid.spec.ts) reads
          # STRIPE_SECRET_KEY to fetch each price from the Stripe REST API and
          # assert it exists + is active + matches the expected $ + interval.
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          # All 6 NEXT_PUBLIC_STRIPE_*_PRICE_ID env vars are public — they
          # ship to the browser bundle anyway. The spec consumes them via
          # process.env so CI must inject them too.
          NEXT_PUBLIC_STRIPE_PRO_MONTHLY_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_PRO_MONTHLY_PRICE_ID }}
          NEXT_PUBLIC_STRIPE_PRO_YEARLY_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_PRO_YEARLY_PRICE_ID }}
          NEXT_PUBLIC_STRIPE_BUSINESS_MONTHLY_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_BUSINESS_MONTHLY_PRICE_ID }}
          NEXT_PUBLIC_STRIPE_BUSINESS_YEARLY_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_BUSINESS_YEARLY_PRICE_ID }}
          NEXT_PUBLIC_STRIPE_REGULATED_MONTHLY_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_REGULATED_MONTHLY_PRICE_ID }}
          NEXT_PUBLIC_STRIPE_REGULATED_YEARLY_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_REGULATED_YEARLY_PRICE_ID }}
          # Set RUN_GENERATOR_TESTS=1 in the nightly schedule to exercise the
          # DPIA/FRIA/Annex IV generators against the live Claude API.
          RUN_GENERATOR_TESTS: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: npx playwright test --reporter=html,list

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 14
